# fly.toml app configuration file generated for micah-bridge on 2026-05-02T23:17:14+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'micah-bridge'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
